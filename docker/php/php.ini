memory_limit = 256M
upload_max_filesize = 16M
post_max_size = 20M
max_execution_time = 60
date.timezone = UTC

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /proc/self/fd/2

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
